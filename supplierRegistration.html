<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SUPPLIER REGISTRATION FORM</title>

<style>

body{
font-family: Arial, sans-serif;
background:orange;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:bisque;
padding:30px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:10px;
color: #333;
}

h3{
margin-top:30px;
border-bottom:2px solid #ddd;
padding-bottom:5px;
}

form{
display:flex;
flex-wrap:wrap;
gap:30px;
}

.form-group{
display:flex;
flex-direction:column;
flex:1 1 45%;
gap: 30px;
}

.full{
flex:1 1 100%;
}

label{
font-weight:bold;
margin-bottom:5px;
}

input, select, textarea{
padding:10px;
border:1px solid #ccc;
border-radius:4px;
width: 100%;
}

textarea{
resize:vertical;
}

button{
padding:12px;
background:#0077cc;
color:lightgrey;
border:none;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#005fa3;
}

</style>

</head>

<body>

<div class="container">

  <h1>NYONDO STOCK SUPPLIER REGISTRATION FORM</h1>
<form>

<h3 class="full">1. Company Information</h3>

<div class="form-group">
<label>Company Name</label>
<input type="text">
</div>

<div class="form-group">
<label>Business Registration Number</label>
<input type="text">
</div>

<div class="form-group">
<label>Business Type</label>
<select>
<option>Select Type</option>
<option>Manufacturer</option>
<option>Distributor</option>
<option>Service Provider</option>
</select>
</div>

<div class="form-group">
<label>Year Established</label>
<input type="number">
</div>

<div class="form-group full">
<label>Business Address</label>
<textarea rows="3"></textarea>
</div>

<h3 class="full">2. Contact Information</h3>

<div class="form-group">
<label>Contact Person</label>
<input type="text">
</div>

<div class="form-group">
<label>Email</label>
<input type="email">
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="tel">
</div>

<div class="form-group">
<label>Website</label>
<input type="text">
</div>

<h3 class="full">3. Tax and Legal Information</h3>

<div class="form-group">
<label>Tax Identification Number (TIN)</label>
<input type="text">
</div>

<div class="form-group">
<label>VAT Registration Number</label>
<input type="text">
</div>

<div class="form-group">
<label>Business License Number</label>
<input type="text">
</div>

<div class="form-group">
<label>Legal Structure</label>
<select>
<option>Sole Proprietorship</option>
<option>Partnership</option>
<option>Limited Company</option>
</select>
</div>

<h3 class="full">4. Banking Details</h3>

<div class="form-group">
<label>Bank Name</label>
<input type="text">
</div>

<div class="form-group">
<label>Account Name</label>
<input type="text">
</div>

<div class="form-group">
<label>Account Number</label>
<input type="text">
</div>

<div class="form-group">
<label>Branch</label>
<input type="text">
</div>

<h3 class="full">5. Products / Services</h3>

<div class="form-group full">
<label>Products or Services Supplied</label>
<textarea rows="3"></textarea>
</div>

<h3 class="full">6. Document Upload</h3>

<div class="form-group">
<label>Business Registration Certificate</label>
<input type="file">
</div>

<div class="form-group">
<label>Tax Clearance Certificate</label>
<input type="file">
</div>

<div class="form-group">
<label>Business License</label>
<input type="file">
</div>

<div class="form-group">
<label>Company Profile</label>
<input type="file">
</div>

<h3 class="full">7. Declaration</h3>

<div class="form-group full">
<label>
<input type="checkbox">
I declare that the information provided is accurate and true.
</label>
</div>

<div class="form-group">
<label>Supplier Name</label>
<input type="text">
</div>

<div class="form-group">
<label>Date</label>
<input type="date">
</div>

<div class="form-group full">
<button type="submit">Submit Registration</button>
</div>

</form>

</div>

</body>
</html>
